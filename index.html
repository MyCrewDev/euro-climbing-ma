        <style>
            :root{--paper:#F4F1EA;--surface:#FFFFFF;--ink:#1A1E27;--ink-2:#4A515E;--muted:#8A8F9A;
                  --hair:#E5E0D5;--navy:#1E2A44;--gold:#B68A3E;--gold-2:#9A7228;}
            *{box-sizing:border-box;margin:0;padding:0}
            html,body{height:100%}
            .staticrypt-body{height:100%;margin:0;background:var(--paper);
                font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
                -webkit-font-smoothing:antialiased;color:var(--ink)}
            .staticrypt-content{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}

            /* faint peak backdrop */
            .bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
            .bg svg{position:absolute;right:-60px;bottom:-40px;width:min(620px,80vw);opacity:.5}

            .card{position:relative;z-index:1;width:380px;max-width:100%;background:var(--surface);
                border:1px solid var(--hair);border-radius:18px;padding:40px 38px 34px;text-align:center;
                box-shadow:0 24px 60px -28px rgba(26,30,39,.35)}

            .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
            .brand .peak{width:38px;height:38px;flex:0 0 auto}
            .brand .wm{font-size:23px;font-weight:600;letter-spacing:.16em;color:var(--navy)}
            .tag{font-size:10.5px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:2px;line-height:1.5}
            .rule{height:1px;background:var(--hair);margin:22px 0 20px}
            .conf{display:inline-block;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);
                font-weight:700;border:1px solid var(--gold);padding:4px 11px;border-radius:6px;margin-bottom:18px}
            .instructions{font-size:13px;color:var(--ink-2);margin-bottom:18px;line-height:1.55}

            .staticrypt-password-container{position:relative;margin-bottom:0}
            #staticrypt-password{width:100%;border:1px solid var(--hair);background:#FBFAF6;border-radius:10px;
                font-size:15px;color:var(--ink);padding:14px 44px 14px 16px;outline:0;transition:border-color .15s,box-shadow .15s;text-align:center}
            #staticrypt-password:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,42,68,.10)}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;width:18px;opacity:.5;
                position:absolute;right:14px;top:50%;transform:translateY(-50%)}

            .staticrypt-decrypt-button{width:100%;border:0;border-radius:10px;background:var(--navy);color:#fff;
                font-size:13.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:14px;cursor:pointer;
                transition:filter .15s}
            .staticrypt-decrypt-button:hover,.staticrypt-decrypt-button:focus{filter:brightness(1.12)}

            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:6px;
                font-size:11px;color:var(--muted);margin:14px 0}
            .staticrypt-remember input[type="checkbox"]{transform:scale(.92);accent-color:var(--navy)}
            .foot{margin-top:22px;font-size:11px;color:var(--muted);letter-spacing:.02em}

            .hidden{display:none !important}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid var(--hair);
                border-right-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
            @keyframes spin{100%{transform:rotate(360deg)}}
        </style>
